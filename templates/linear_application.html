<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción Duración Netflix</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f0f4ff;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        h1 {
            color: #e50914;
        }

        input[type="number"] {
            padding: 10px;
            margin: 20px 0;
            width: 80%;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #1e3c72;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 5px solid #1e3c72;
        }

        a.back {
            display: inline-block;
            margin-top: 20px;
            color: #1e3c72;
            text-decoration: none;
            font-weight: bold;
        }

        a.back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Gender Prediction on Netflix</h1>
        <p>Discover the main genre of a movie or series based on its description using NLP.</p>

        <form method="POST">
            <label for="descripcion"><strong>Description (in English):</strong></label><br>
            <textarea id="descripcion" name="descripcion"
                placeholder="Ej: A young boy discovers he has magical powers..." rows="4"
                style="width:80%; padding:10px; margin: 20px 0; border-radius: 6px; border: 1px solid #ccc; font-family: inherit;"
                required></textarea>
            <br>
            <button type="submit">Predict Genre</button>
        </form>

        {% if result is not none %}
        <div class="result">
            <h2>Estimated Genre: {{ result }}</h2>
        </div>
        {% endif %}

        <a class="back" href="/">⬅ Volver al Inicio</a>
    </div>
</body>

</html>
