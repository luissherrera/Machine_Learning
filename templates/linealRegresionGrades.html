<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Predicción de Compra</title>
</head>

<body>

<h1>Predicción de Cliente (Regresión Logística)</h1>

<form method="POST">

<label>Edad:</label>
<input type="number" name="edad" required><br><br>

<label>Ingreso mensual:</label>
<input type="number" name="ingreso" required><br><br>

<label>Visitas al mes:</label>
<input type="number" name="visitas" required><br><br>


<label>Tiempo en el sitio (minutos):</label>
<input type="number" step="0.1" name="tiempo" required><br><br>

<label>Compras previas:</label>

<input type="number" name="compras" required><br><br>

<label>¿Usó descuento? (0 = No, 1 = Sí):</label>
<input type="number" name="descuento" min="0" max="1" required><br><br>


<button type="submit">Predecir</button>

</form>


{% if resultado %}
<h2>Resultado: {{ resultado }}</h2>
{% endif %}

</body>

</html>
//cometario de prueba
